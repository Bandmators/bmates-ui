name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify npm authentication
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or not set. Add a granular npm token (with bypass 2FA enabled) to the repo secrets before re-running."
            exit 1
          fi
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build package
        run: pnpm buildOnce

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump package version
        id: bump
        run: |
          npm version "${{ github.event.inputs.release_type }}" --no-git-tag-version
          NEXT_VERSION="$(node -p "require('./package.json').version")"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag release
        run: |
          git add package.json
          git commit -m "chore(release): v${{ steps.bump.outputs.next_version }}"
          git tag "v${{ steps.bump.outputs.next_version }}"
          git push origin HEAD
          git push origin "v${{ steps.bump.outputs.next_version }}"

      - name: Publish package to npm
        run: pnpm publish --access public --no-git-checks --registry https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
